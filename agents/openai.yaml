# s3s — Seedance Shotlist Suite

Agent-native workflow package for building Seedance 2.0 videos.

## Usage

- `/s3s` — start the full workflow (assets → interview → shotlist)
- `/s3s-analyze` — reverse-engineer a reference clip into a brief
- `/s3s-variations` — generate 5–10 shot/composition options for one moment
- `/s3s-references` — build reference sheets only
- `/s3s-interview` — creative intake and brief
- `/s3s-shotlist` — generate the HTML shotlist from an existing brief

## Validate

```bash
python scripts/validate_skills.py
```
